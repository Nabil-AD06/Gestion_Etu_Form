version: '3.8'

# ============================================
# Docker Compose - Gestion Étudiants & Formations
# ============================================
# Lance 3 services :
#   - postgres : la base de données
#   - backend  : l'API Node.js
#   - pgadmin  : interface web pour visualiser la BDD (optionnel)

services:

  # ─── Base de données PostgreSQL ──────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gestion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_etudiants
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"       # Accessible depuis ton PC aussi
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persistance des données
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Backend Node.js ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_backend
    restart: unless-stopped
    env_file: .env             # charge toutes les variables depuis .env
    ports:
      - "3000:3000"
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy   # attend que postgres soit prêt
    volumes:
      - .:/app                  # hot-reload en développement
      - /app/node_modules       # ne pas écraser node_modules du conteneur

  # ─── PgAdmin (interface graphique BDD) ───────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gestion_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pgadmin.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin123
    ports:
      - "5050:80"              # Interface web sur http://localhost:5050
    networks:
      - app_network
    depends_on:
      - postgres

# ─── Volumes persistants ─────────────────────────────
volumes:
  postgres_data:

# ─── Réseau interne ──────────────────────────────────
networks:
  app_network:
    driver: bridge